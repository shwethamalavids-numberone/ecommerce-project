<!DOCTYPE html>
<html>
<head>
<title>Simple E-Commerce</title>

<style>
body{
font-family: Arial;
background:#f5f5f5;
text-align:center;
}

h1{
background:#333;
color:white;
padding:15px;
}

.container{
display:flex;
justify-content:center;
gap:20px;
margin-top:20px;
}

.product{
background:white;
padding:15px;
border-radius:10px;
width:150px;
box-shadow:0 0 5px gray;
}

button{
background:green;
color:white;
border:none;
padding:8px;
margin-top:10px;
cursor:pointer;
}

.cart{
margin-top:40px;
background:white;
padding:20px;
width:300px;
margin-left:auto;
margin-right:auto;
border-radius:10px;
box-shadow:0 0 5px gray;
}

.remove{
background:red;
margin-left:10px;
}
</style>
</head>

<body>

<h1>My E-Commerce Store</h1>

<h2>Products</h2>

<div class="container">

<div class="product">
<h3>Shoes</h3>
<p>₹1500</p>
<button onclick="addToCart('Shoes',1500)">Add to Cart</button>
</div>

<div class="product">
<h3>Watch</h3>
<p>₹2000</p>
<button onclick="addToCart('Watch',2000)">Add to Cart</button>
</div>

<div class="product">
<h3>Bag</h3>
<p>₹1200</p>
<button onclick="addToCart('Bag',1200)">Add to Cart</button>
</div>

</div>

<div class="cart">
<h2>Cart</h2>
<ul id="cartItems"></ul>
<h3>Total: ₹<span id="total">0</span></h3>
</div>

<script>

let cart = [];
let total = 0;

function addToCart(name,price){

cart.push({name,price});

total += price;

displayCart();

}

function removeItem(index){

total -= cart[index].price;

cart.splice(index,1);

displayCart();

}

function displayCart(){

let cartList = document.getElementById("cartItems");

cartList.innerHTML="";

cart.forEach((item,index)=>{

let li=document.createElement("li");

li.innerHTML=item.name + " - ₹" + item.price +
"<button class='remove' onclick='removeItem("+index+")'>X</button>";

cartList.appendChild(li);

});

document.getElementById("total").innerText=total;

}

</script>

</body>
</html>
